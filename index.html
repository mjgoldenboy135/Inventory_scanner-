<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Inventory Scanner - Optimized</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
/* ... (Styles kept same as your functional original for UI consistency) ... */
:root{--bg:#f0f4ff;--surface:#ffffff;--surface2:#f8faff;--border:#e2e8f0;--text:#1e293b;--amber:#f59e0b;--blue:#2563eb;--green:#16a34a;--red:#dc2626;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;}
#hdr{background:var(--surface);border-bottom:3px solid var(--amber);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.logo{display:flex;align-items:center;gap:12px;}.li{width:42px;height:42px;background:linear-gradient(135deg,#f59e0b,#f97316);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
#main{padding-bottom:82px;}.tab{display:none;}.tab.active{display:block;}
#cam-wrap{position:relative;background:#1a1a2e;height:350px;overflow:hidden;}
#video{width:100%;height:100%;object-fit:cover;}
#canvas{display:none;}
#overlay{position:absolute;inset:0;pointer-events:none;}
.sbox{position:absolute;left:15%;right:15%;top:20%;bottom:20%;border:2px solid rgba(255,255,255,0.5);border-radius:8px;}
.bstart{background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border:none;border-radius:28px;padding:13px 34px;font-weight:700;cursor:pointer;}
#nav{position:fixed;bottom:0;width:100%;max-width:480px;background:#fff;display:flex;border-top:1px solid #ddd;}
.nb{flex:1;padding:15px;background:none;border:none;cursor:pointer;font-weight:600;color:#94a3b8;}
.nb.active{color:var(--blue);border-top:3px solid var(--blue);}
.rwrap{padding:16px;}.found{background:#fff;border:2px solid var(--green);border-radius:12px;overflow:hidden;}
.frow{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee;}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;display:none;z-index:9999;}
</style>
</head>
<body>

<div id="hdr">
  <div class="logo"><div class="li">📦</div><div><div style="font-weight:800">Scanner Pro</div></div></div>
  <div id="badge" style="font-size:12px;padding:4px 10px;background:#eee;border-radius:15px">0 items</div>
</div>

<div id="main">
  <div class="tab active" id="tab-scan">
    <div id="cam-wrap">
      <video id="video" muted playsinline></video>
      <canvas id="canvas"></canvas>
      <div id="overlay"><div class="sbox"><div style="width:100%;height:2px;background:red;position:absolute;top:50%;opacity:0.5"></div></div></div>
      <div id="cam-ph" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1a2e">
        <button class="bstart" onclick="startCam()">📸 Start Camera</button>
      </div>
    </div>
    
    <div style="padding:15px;background:#fff;border-bottom:1px solid #eee">
      <div id="stxt" style="font-size:13px;color:var(--blue);font-weight:600">Ready to scan...</div>
    </div>

    <div id="res" style="display:none" class="rwrap">
      <div class="found">
        <div style="padding:10px;background:var(--green);color:#fff;font-weight:700">Found Product</div>
        <div id="ffields"></div>
      </div>
      <button onclick="clearRes()" style="width:100%;margin-top:10px;padding:12px;border:none;border-radius:8px;background:#64748b;color:#fff">Clear</button>
    </div>
  </div>

  <div class="tab" id="tab-inventory"><div id="il" style="padding:20px">No products loaded.</div></div>
  <div class="tab" id="tab-import" style="padding:20px">
    <button class="bstart" style="width:100%" onclick="document.getElementById('fi').click()">📊 Import Excel File</button>
    <input id="fi" type="file" style="display:none" onchange="importFile(event)"/>
  </div>
</div>

<nav id="nav">
  <button class="nb active" onclick="showTab('scan')">Scanner</button>
  <button class="nb" onclick="showTab('inventory')">Inventory</button>
  <button class="nb" onclick="showTab('import')">Import</button>
</nav>

<div id="toast"></div>

<script>
var inventory=[], headers=[], scanning=false, camStream=null, lastCode='', bdet=null, zxingReader=null;

window.addEventListener('load', () => {
  // 1. Setup Native Barcode Detector (Fastest for EAN/Code128)
  if('BarcodeDetector' in window) {
    bdet = new BarcodeDetector({formats: ['code_128', 'ean_13', 'qr_code', 'data_matrix']});
  }
  // 2. Setup ZXing (Most Reliable for DataMatrix)
  if(window.ZXing) {
    zxingReader = new ZXing.MultiFormatReader();
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    zxingReader.setHints(hints);
  }
});

function startCam() {
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}})
  .then(s => {
    camStream=s; document.getElementById('video').srcObject=s;
    document.getElementById('video').play();
    document.getElementById('cam-ph').style.display='none';
    scanning=true; requestAnimationFrame(loop);
  });
}

function loop() {
  if(!scanning) return;
  const v = document.getElementById('video');
  const c = document.getElementById('canvas');
  if(v.readyState === v.HAVE_ENOUGH_DATA) {
    const ctx = c.getContext('2d', {willReadFrequently:true});
    c.width = v.videoWidth; c.height = v.videoHeight;
    ctx.drawImage(v, 0, 0, c.width, c.height);

    // TRY 1: Native Detector (Best for normal barcodes)
    if(bdet) {
      bdet.detect(v).then(codes => { if(codes.length > 0) onCode(codes[0].rawValue); });
    }

    // TRY 2: ZXing Full Frame
    tryZXing(c);

    // TRY 3: Macro-Zoom Crop (Helps small DataMatrix dots)
    const zoom = Math.min(c.width, c.height) * 0.4;
    const tempC = document.createElement('canvas'); 
    tempC.width = 600; tempC.height = 600;
    const tCtx = tempC.getContext('2d');
    tCtx.drawImage(c, (c.width-zoom)/2, (c.height-zoom)/2, zoom, zoom, 0, 0, 600, 600);
    
    // Apply contrast to the crop only to help DataMatrix
    const img = tCtx.getImageData(0,0,600,600);
    for(let i=0; i<img.data.length; i+=4) {
      const g = 0.299*img.data[i] + 0.587*img.data[i+1] + 0.114*img.data[i+2];
      img.data[i] = img.data[i+1] = img.data[i+2] = (g > 120) ? 255 : 0;
    }
    tCtx.putImageData(img, 0, 0);
    tryZXing(tempC);
  }
  requestAnimationFrame(loop);
}

function tryZXing(canvas) {
  if(!zxingReader) return;
  try {
    const lum = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
    const bin = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
    const res = zxingReader.decode(bin);
    if(res) onCode(res.getText());
  } catch(e) {}
}

function onCode(code) {
  if(code === lastCode) return;
  lastCode = code;
  document.getElementById('stxt').textContent = "Scanning: " + code;
  lookup(code);
}

function lookup(code) {
  const item = inventory.find(i => String(i.__barcode) === String(code) || String(i.__code) === String(code));
  if(item) {
    document.getElementById('res').style.display='block';
    document.getElementById('ffields').innerHTML = headers.map(h => `
      <div class="frow"><span>${h}</span><span style="font-weight:700">${item[h]||'—'}</span></div>
    `).join('');
  } else { toast("Item not found", "err"); }
}

function importFile(e) {
  const f = e.target.files[0];
  const r = new FileReader();
  r.onload = (ev) => {
    const wb = XLSX.read(ev.target.result, {type:'binary'});
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
    headers = rows[0];
    inventory = rows.slice(1).map(r => {
      let o={__code:r[0], __barcode:r[1]};
      headers.forEach((h,i) => o[h]=r[i]);
      return o;
    });
    document.getElementById('badge').textContent = inventory.length + " items";
    toast("Loaded " + inventory.length + " items");
    showTab('scan');
  };
  r.readAsBinaryString(f);
}

function showTab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t !== 'scan' && camStream) { scanning=false; camStream.getTracks().forEach(tr => tr.stop()); }
}

function toast(m, type="ok") {
  const t = document.getElementById('toast');
  t.style.display='block'; t.style.background = type==="err"?"#fee2e2":"#dcfce7";
  t.style.color = type==="err"?"#dc2626":"#16a34a"; t.textContent = m;
  setTimeout(()=>t.style.display='none', 2000);
}
function clearRes() { document.getElementById('res').style.display='none'; lastCode=''; }
</script>
</body>
</html>
