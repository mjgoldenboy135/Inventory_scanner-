<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Inventory Scanner - SFDA Optimized</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
:root{
  --bg:#f0f4ff;--surface:#ffffff;--surface2:#f8faff;--border:#e2e8f0;--border2:#cbd5e1;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;--amber:#f59e0b;--amber-bg:#fffbeb;
  --blue:#2563eb;--blue-bg:#eff6ff;--green:#16a34a;--green-bg:#f0fdf4;--red:#dc2626;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;overflow-x:hidden;}
#hdr{background:var(--surface);border-bottom:3px solid var(--amber);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(245,158,11,.15);}
.logo{display:flex;align-items:center;gap:12px;}
.li{width:42px;height:42px;background:linear-gradient(135deg,#f59e0b,#f97316);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.ln{font-size:17px;font-weight:800;color:var(--text);}
#badge{border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600;border:2px solid var(--border);color:var(--text3);background:var(--surface2);}
#badge.on{background:var(--green-bg);border-color:var(--green);color:var(--green);}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:2px solid var(--border);display:flex;z-index:200;}
.nb{flex:1;background:none;border:none;padding:12px 8px 10px;color:var(--text3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;}
.nb.active{color:var(--blue);border-top:3px solid var(--blue);}
#main{flex:1;padding-bottom:82px;}
.tab{display:none;}.tab.active{display:block;}
#cam-wrap{position:relative;background:#1a1a2e;overflow:hidden;height:350px;display:flex;align-items:center;justify-content:center;}
#video{width:100%;height:100%;object-fit:cover;display:none;}
#canvas{display:none;}
#cam-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#1a1a2e;padding:20px;text-align:center;}
.bstart{background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border:none;border-radius:28px;padding:13px 34px;font-size:15px;font-weight:700;cursor:pointer;}
#overlay{position:absolute;inset:0;pointer-events:none;display:none;}
.sbox{position:absolute;left:25%;right:25%;top:25%;bottom:25%;border:2px solid #f59e0b;border-radius:8px;box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);}
#sline{position:absolute;left:0;right:0;height:2px;top:0;background:#fff;box-shadow:0 0 8px #fff;animation:sa 2s ease-in-out infinite;}
@keyframes sa{0%{top:0}100%{top:100%}}
.mbar{padding:16px;border-bottom:2px solid var(--border);background:var(--surface);}
.slbl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;margin-bottom:8px;}
.row{display:flex;gap:8px;}
.ci{flex:1;background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:12px;outline:none;}
.bblue{background:var(--blue);border:none;border-radius:12px;color:#fff;padding:12px 18px;cursor:pointer;}
.rwrap{padding:16px;}
.found{background:var(--surface);border:2px solid var(--green);border-radius:14px;overflow:hidden;}
.fhdr{background:var(--green-bg);padding:12px;font-weight:700;color:var(--green);border-bottom:1px solid var(--green);}
.frow{display:flex;justify-content:space-between;padding:10px 15px;border-bottom:1px solid var(--border);}
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);border-radius:12px;padding:12px 24px;z-index:9999;display:none;font-weight:600;}
/* Modals etc skipped for brevity, keeping your original styles */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.mbox{background:#fff;padding:24px;border-radius:20px;width:100%;max-width:320px;text-align:center;}
</style>
</head>
<body>

<div id="hdr">
  <div class="logo"><div class="li">📦</div><div><div class="ln">SFDA Tracker</div></div></div>
  <div id="badge">0 items</div>
</div>

<div id="main">
  <div class="tab active" id="tab-scan">
    <div id="cam-wrap">
      <video id="video" muted playsinline></video>
      <canvas id="canvas"></canvas>
      <div id="cam-ph">
        <button class="bstart" onclick="startCam()">📸 Start Scanning</button>
        <p style="color:#666;font-size:12px;margin-top:10px">Optimized for DataMatrix (Medicine Boxes)</p>
      </div>
      <div id="overlay"><div class="sbox"><div id="sline"></div></div></div>
    </div>
    
    <div class="mbar">
      <div class="slbl">Scan Status</div>
      <div id="stxt" style="font-size:14px;color:var(--blue)">Waiting for camera...</div>
    </div>

    <div class="mbar">
      <div class="slbl">Manual Entry</div>
      <div class="row">
        <input class="ci" id="min" placeholder="Item Code..."/>
        <button class="bblue" onclick="doManual()">🔍</button>
      </div>
    </div>

    <div id="res" style="display:none" class="rwrap">
      <div id="fcard" class="found">
        <div class="fhdr">✅ Product Found</div>
        <div id="ffields"></div>
      </div>
      <button class="bblue" style="width:100%;margin-top:10px;background:#666" onclick="clearRes()">Clear</button>
    </div>
  </div>

  <div class="tab" id="tab-inventory">
    <div style="padding:20px" id="il">No inventory loaded.</div>
  </div>

  <div class="tab" id="tab-import">
    <div style="padding:20px">
      <button class="bstart" style="width:100%" onclick="document.getElementById('fi').click()">📁 Import Excel</button>
      <input id="fi" type="file" style="display:none" onchange="importFile(event)"/>
    </div>
  </div>
</div>

<nav id="nav">
  <button class="nb active" onclick="showTab('scan')">📸 Scan</button>
  <button class="nb" onclick="showTab('inventory')">📋 List</button>
  <button class="nb" onclick="showTab('import')">📊 Import</button>
</nav>

<div id="toast"></div>

<script>
let inventory = [], headers = [];
let camStream = null, scanning = false;
let zxingReader = null;
let lastCode = '';

// ── INITIALIZE SCANNER ─────────────────────────────────
window.addEventListener('load', () => {
  if (window.ZXing) {
    zxingReader = new ZXing.MultiFormatReader();
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.DATA_MATRIX,
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.CODE_128
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    zxingReader.setHints(hints);
  }
});

function startCam() {
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280, height: 720 } })
    .then(stream => {
      camStream = stream;
      const v = document.getElementById('video');
      v.srcObject = stream;
      v.style.display = 'block';
      document.getElementById('cam-ph').style.display = 'none';
      document.getElementById('overlay').style.display = 'block';
      v.play();
      scanning = true;
      requestAnimationFrame(loop);
    });
}

// ── THE "TAMENI-STYLE" OPTIMIZED LOOP ──────────────────
function loop() {
  if (!scanning) return;
  const v = document.getElementById('video');
  const c = document.getElementById('canvas');
  if (v.readyState === v.HAVE_ENOUGH_DATA) {
    const ctx = c.getContext('2d', { willReadFrequently: true });
    
    // 1. Zoom into the center (where the orange box is)
    // Most medicine codes are small; zooming 2.5x helps ZXing see the dots
    const zoomSize = Math.min(v.videoWidth, v.videoHeight) * 0.4;
    const sx = (v.videoWidth - zoomSize) / 2;
    const sy = (v.videoHeight - zoomSize) / 2;
    
    c.width = 600; c.height = 600;
    ctx.drawImage(v, sx, sy, zoomSize, zoomSize, 0, 0, 600, 600);

    // 2. Pre-process (Hard Thresholding for GS1 DataMatrix)
    const imgData = ctx.getImageData(0, 0, 600, 600);
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
      const g = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      const v = g > 120 ? 255 : 0; // Create high contrast dots
      d[i] = d[i+1] = d[i+2] = v;
    }
    ctx.putImageData(imgData, 0, 0);

    // 3. Decode
    try {
      const lum = new ZXing.HTMLCanvasElementLuminanceSource(c);
      const bin = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
      const result = zxingReader.decode(bin);
      if (result) onCode(result.getText());
    } catch (e) {}
  }
  requestAnimationFrame(loop);
}

function onCode(code) {
  if (code === lastCode) return;
  lastCode = code;
  document.getElementById('stxt').textContent = "Detected: " + code;
  lookup(code);
}

function lookup(code) {
  const item = inventory.find(i => String(i.__barcode) === String(code) || String(i.__code) === String(code));
  if (item) {
    document.getElementById('res').style.display = 'block';
    document.getElementById('ffields').innerHTML = headers.map(h => `
      <div class="frow">
        <span style="color:#999;font-size:12px">${h}</span>
        <span style="font-weight:700">${item[h] || '—'}</span>
      </div>
    `).join('');
  } else {
    toast("Code not in inventory", "err");
  }
}

function importFile(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = (ev) => {
    const wb = XLSX.read(ev.target.result, { type: 'binary' });
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
    headers = rows[0];
    inventory = rows.slice(1).map(r => {
      let o = { __code: r[0], __barcode: r[1] };
      headers.forEach((h, i) => o[h] = r[i]);
      return o;
    });
    document.getElementById('badge').textContent = inventory.length + " items";
    document.getElementById('badge').className = "on";
    toast("Imported " + inventory.length + " items");
    showTab('scan');
  };
  reader.readAsBinaryString(file);
}

function showTab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  if(t !== 'scan') { scanning = false; if(camStream) camStream.getTracks().forEach(t => t.stop()); }
}

function toast(m, type="ok") {
  const t = document.getElementById('toast');
  t.style.display = 'block';
  t.style.background = type === "err" ? "#fee2e2" : "#dcfce7";
  t.style.color = type === "err" ? "#dc2626" : "#16a34a";
  t.textContent = m;
  setTimeout(() => t.style.display = 'none', 3000);
}

function clearRes() { document.getElementById('res').style.display = 'none'; lastCode = ''; }
function doManual() { lookup(document.getElementById('min').value); }
</script>
</body>
</html>
